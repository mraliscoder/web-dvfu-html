<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список гор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Горы России</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="table.html">Список гор</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="rock.html">О горе</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="images/1.jpg">Картинка</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5 mt-3">
        <h1>Список гор</h1>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Фильтр</h5>
                    </div>
                    <div class="card-body">
                        <form id="filter">
                            <div class="mb-3">
                                <label class="form-label">Название:</label>
                                <input type="text" id="name" class="form-control">
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Высота от:</label>
                                    <input type="number" id="heightFrom" placeholder="От" class="form-control">
                                </div>
                                <div class="col">
                                    <label class="form-label">до:</label>
                                    <input type="number" id="heightTo" placeholder="До" class="form-control">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Горная система:</label>
                                <input type="text" id="system" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Тип вершины:</label>
                                <input type="text" id="type" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Регион:</label>
                                <input type="text" id="region" class="form-control">
                            </div>
                            <input type="button" value="Искать" id="findBtn" class="btn btn-primary">
                            <input type="button" value="Сбросить" id="clearFilterBtn" class="btn btn-secondary">
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Сортировка</h5>
                    </div>
                    <div class="card-body">
                        <form id="sort">
                            <div class="mb-3">
                                <label class="form-label">Первый уровень:</label>
                                <div class="input-group">
                                    <select id="fieldsFirst" class="form-select"></select>
                                    <div class="input-group-text">
                                        <input type="checkbox" id="fieldsFirstDesc" class="form-check-input mt-0">
                                        <span class="ms-2">по убыванию?</span>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Второй уровень:</label>
                                <div class="input-group">
                                    <select id="fieldsSecond" class="form-select"></select>
                                    <div class="input-group-text">
                                        <input type="checkbox" id="fieldsSecondDesc" class="form-check-input mt-0">
                                        <span class="ms-2">по убыванию?</span>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Третий уровень:</label>
                                <div class="input-group">
                                    <select id="fieldsThird" class="form-select"></select>
                                    <div class="input-group-text">
                                        <input type="checkbox" id="fieldsThirdDesc" class="form-check-input mt-0">
                                        <span class="ms-2">по убыванию?</span>
                                    </div>
                                </div>
                            </div>
                            <input type="button" value="Сортировать" id="sortBtn" class="btn btn-primary">
                            <input type="button" value="Сбросить" id="resetSortBtn" class="btn btn-secondary">
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table id="list" class="table table-striped table-bordered">
            </table>
        </div>

        <div class="card mt-4">
            <div class="card-header">
                <h5 class="mb-0">График</h5>
            </div>
            <div class="card-body">
                <form>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Группировка:</label>
                            <select name="group_by" class="form-select">
                                <option value="system">Горная система</option>
                                <option value="type">Тип вершины</option>
                                <option value="region" selected>Регион</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Показать:</label>
                            <div class="form-check">
                                <input type="checkbox" name="graph_min" checked class="form-check-input" id="graphMin">
                                <label class="form-check-label" for="graphMin">Минимальная высота</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" name="graph_max" checked class="form-check-input" id="graphMax">
                                <label class="form-check-label" for="graphMax">Максимальная высота</label>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3 d-flex align-items-end">
                            <button class="btn btn-primary">Построить</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <hr class="my-4">
        <div class="text-center mb-3">
            <a href="https://edwardcode.net/">Эдуард Ильин</a>, Б9123-09.03.04
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JavaScript/data.js"></script>
    <script src="JavaScript/table.js"></script>
    <script src="JavaScript/filter.js"></script>
    <script src="JavaScript/sort.js"></script>
    <script src="JavaScript/main.js"></script>
</body>
</html>
