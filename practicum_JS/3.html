<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const arr = [2, 2, 4, 1, 6, 12];

        const result = arr.map((val, i, a) => {
        const neighbors = [a[i - 1], val, a[i + 1]].filter(n => n !== undefined);
        return +(neighbors.reduce((sum, n) => sum + n, 0) / neighbors.length).toFixed(2);
        });

        console.log(result);
    </script>
</body>
</html>
